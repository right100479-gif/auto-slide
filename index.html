<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Praise Master Pro - 가창 진도율 보호 시스템 v6.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    
    <style>
        :root {
            --bg-dark: #090d16;
            --card-bg: #131b2e;
            --card-border: #1e293b;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.15);
            --success: #10b981;
            --danger: #ef4444;
            --chorus: #ec4899;
            --chorus-glow: rgba(236, 72, 153, 0.2);
            --verse: #a855f7;
            --verse-glow: rgba(168, 85, 247, 0.2);
            --text-main: #f8fafc;
            --text-muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Urbanist', 'Pretendard', sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* [STEP 1] SETUP SCREEN */
        #setup-screen {
            flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 900px; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 2.8rem; font-weight: 700; letter-spacing: -1px; color: var(--text-main); }
        .header h1 span { color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); }
        .header p { color: var(--text-muted); margin-top: 10px; font-size: 1.1rem; }

        .upload-zone {
            border: 2px dashed var(--accent); background: rgba(56, 189, 248, 0.02);
            border-radius: 20px; padding: 50px 30px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .upload-zone:hover { background: rgba(56, 189, 248, 0.05); border-color: var(--text-main); }

        #review-area { margin-top: 30px; display: grid; gap: 20px; }
        .review-card {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 16px; padding: 20px; display: grid; grid-template-columns: 180px 1fr;
            gap: 20px; align-items: center; position: relative;
        }
        .review-card.chorus-highlight { border: 2px solid var(--chorus) !important; box-shadow: 0 4px 20px var(--chorus-glow); }
        .review-card.verse-highlight { border: 2px solid var(--verse) !important; box-shadow: 0 4px 20px var(--verse-glow); }

        .preview-box { position: relative; width: 100%; height: 110px; border-radius: 10px; overflow: hidden; border: 1px solid var(--card-border); }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; }
        .slide-badge { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.85); padding: 4px 10px; border-radius: 5px; font-size: 0.8rem; color: var(--accent); font-weight: bold; }

        .editor-inputs { display: grid; grid-template-columns: 120px 1fr; gap: 15px; }
        .attribute-input { width: 100%; height: 70px; background: #090d16; color: #facc15; font-weight: bold; border: 1px solid var(--card-border); border-radius: 8px; padding: 10px; text-align: center; outline: none; }
        .lyrics-editor { width: 100%; height: 70px; background: #090d16; color: var(--text-main); border: 1px solid var(--card-border); border-radius: 8px; padding: 10px; font-size: 1rem; resize: none; outline: none; transition: 0.2s; }
        .lyrics-editor:focus { border-color: var(--accent); }

        .chorus-badge { position: absolute; top: 15px; right: 20px; background: var(--chorus); color: white; font-size: 0.75rem; font-weight: bold; padding: 4px 10px; border-radius: 20px; }
        .verse-badge { position: absolute; top: 15px; right: 20px; background: var(--verse); color: white; font-size: 0.75rem; font-weight: bold; padding: 4px 10px; border-radius: 20px; }

        /* [STEP 2] LIVE SCREEN */
        #live-screen { display: none; flex: 1; background: #000; position: relative; justify-content: center; align-items: center; }
        #slide-view { max-width: 100%; max-height: 100%; object-fit: contain; }

        #monitor {
            position: absolute; top: 25px; right: 25px; width: 330px;
            background: rgba(19, 27, 46, 0.85); border: 1px solid var(--card-border);
            border-radius: 16px; padding: 20px; backdrop-filter: blur(12px); z-index: 10;
        }
        #monitor.chorus-active { border-color: var(--chorus); box-shadow: 0 0 25px var(--chorus-glow); }
        #monitor.verse-active { border-color: var(--verse); box-shadow: 0 0 25px var(--verse-glow); }

        .monitor-header { font-weight: bold; font-size: 0.95rem; padding-bottom: 12px; border-bottom: 1px solid var(--card-border); margin-bottom: 15px; display: flex; justify-content: space-between; }
        .monitor-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; }
        
        /* 진행률 게이지 스타일 */
        .progress-container { width: 100%; height: 8px; background: #090d16; border-radius: 4px; margin-top: 5px; overflow: hidden; border: 1px solid #1e293b; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #38bdf8, #10b981); transition: width 0.3s; }

        .voice-box { margin-top: 15px; background: rgba(9, 13, 22, 0.6); border-radius: 8px; padding: 12px; min-height: 55px; color: #facc15; font-weight: bold; border: 1px solid rgba(250, 204, 21, 0.2); word-break: break-all; }

        #jump-hud {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(9, 13, 22, 0.95); border: 2px solid var(--accent);
            border-radius: 20px; padding: 30px 60px; text-align: center; z-index: 100; display: none;
        }
        #hud-number { font-size: 5.5rem; font-weight: 700; color: var(--accent); }

        /* [STEP 3] BOTTOM BAR */
        .bottom-bar { padding: 20px; background: var(--card-bg); border-top: 1px solid var(--card-border); display: flex; justify-content: center; gap: 15px; z-index: 20; }
        .btn { padding: 12px 28px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 10px; color: white; }
        .btn-ghost { background: transparent; border: 1px solid var(--card-border); }
        .btn-primary { background: var(--accent); color: var(--bg-dark); }
        .btn-success { background: var(--success); }
        .btn-warning { background: #eab308; color: var(--bg-dark); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        #preprocess-canvas { display: none; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="container">
            <div class="header">
                <h1>AI PRAISE MASTER <span>PRO v6.0</span></h1>
                <p>AI가 가사와 절수를 분석합니다. <span style="color:var(--success)">[Smart Lock]</span> 가창 진도 70% 이후에만 자동 전환이 허용됩니다.</p>
            </div>
            <div class="upload-zone" onclick="document.getElementById('file-input').click()">
                <i class="fa-solid fa-cloud-arrow-up" style="font-size:3rem; color:var(--accent); margin-bottom:15px;"></i>
                <h3>이미지들을 드래그하거나 선택하세요</h3>
                <input type="file" id="file-input" multiple accept="image/*" style="display:none;">
            </div>
            <div id="review-area"></div>
            <div style="text-align: center; margin-top: 40px; padding-bottom: 80px;">
                <button id="btn-launch" class="btn btn-success" style="display:none; width:100%; justify-content:center; font-size:1.3rem; padding: 18px;">
                    <i class="fa-solid fa-play"></i> 가사 교정 완료 및 시스템 시작
                </button>
            </div>
        </div>
    </div>

    <div id="live-screen">
        <img id="slide-view" src="">
        <div id="monitor">
            <div class="monitor-header"><span><i class="fa-solid fa-circle-nodes"></i> System Status</span><span id="system-time">00:00:00</span></div>
            <div class="monitor-row"><span>마이크</span><span id="mic-status"><span class="status-dot dot-off"></span> OFF</span></div>
            <div class="monitor-row"><span>슬라이드</span><span id="page-counter" style="color:var(--accent); font-weight:bold;">0 / 0</span></div>
            
            <div class="monitor-row" style="flex-direction: column; margin-top:10px;">
                <div style="display:flex; justify-content:space-between; width:100%;">
                    <span class="monitor-label">가창 진행률 (최소 70% 필요)</span>
                    <span id="progress-text" style="font-weight:bold; color:var(--success);">0%</span>
                </div>
                <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>
            </div>

            <div class="monitor-row" style="margin-top: 15px; flex-direction: column;">
                <span class="monitor-label"><i class="fa-solid fa-circle-right"></i> 다음 장 트리거 (Lock 해제 대기)</span>
                <span id="next-trigger" style="color: #00eafe; font-weight: bold; font-size: 0.95rem;">-</span>
            </div>
            <div class="monitor-row" style="margin-top: 10px; flex-direction: column;">
                <div class="voice-box" id="voice-preview">음성인식을 활성화해주세요.</div>
            </div>
        </div>

        <div id="jump-hud"><div id="hud-number">0</div></div>
    </div>

    <div class="bottom-bar">
        <button class="btn btn-ghost" onclick="location.reload()"><i class="fa-solid fa-rotate-right"></i> 리셋</button>
        <button class="btn btn-warning" id="btn-edit-back" style="display:none;"><i class="fa-solid fa-pen-to-square"></i> 가사 재교정</button>
        <button class="btn btn-success" id="btn-projector" style="display:none;"><i class="fa-solid fa-desktop"></i> 📺 프로젝터 송출</button>
        <button class="btn btn-ghost" id="btn-prev" disabled>이전</button>
        <button class="btn btn-primary" id="btn-mic-toggle" style="display:none;">🎙️ 음성 인식 시작</button>
        <button class="btn btn-ghost" id="btn-next" disabled>다음</button>
    </div>

    <canvas id="preprocess-canvas"></canvas>

    <script>
        let slidesData = [];
        let currentIndex = 0;
        let recognition;
        let isListening = false;
        let lastTriggerTime = 0;
        let ocrWorker = null;
        let projectorWindow = null;
        let jumpBuffer = "";
        let jumpTimeout = null;

        // 가창 진도 추적용 변수
        let currentSlideKeywordsSet = new Set();
        let detectedKeywordsSet = new Set();
        let currentProgress = 0;

        const fileInput = document.getElementById('file-input');
        const reviewArea = document.getElementById('review-area');
        const setupScreen = document.getElementById('setup-screen');
        const liveScreen = document.getElementById('live-screen');
        const slideView = document.getElementById('slide-view');
        const btnLaunch = document.getElementById('btn-launch');
        const btnMicToggle = document.getElementById('btn-mic-toggle');
        const btnProjector = document.getElementById('btn-projector');
        const voicePreview = document.getElementById('voice-preview');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');

        setInterval(() => { document.getElementById('system-time').textContent = new Date().toTimeString().split(' ')[0]; }, 1000);

        async function preprocessImage(imgElement) {
            return new Promise((resolve) => {
                const canvas = document.getElementById('preprocess-canvas');
                const ctx = canvas.getContext('2d');
                const width = imgElement.naturalWidth;
                const height = imgElement.naturalHeight;
                const cropTop = height * 0.60; // 가사 영역 ROI 크롭
                const cropHeight = height * 0.40;
                canvas.width = width; canvas.height = cropHeight;
                ctx.drawImage(imgElement, 0, cropTop, width, cropHeight, 0, 0, width, cropHeight);
                let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                let data = imgData.data;
                for (let i = 0; i < data.length; i += 4) {
                    const luma = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                    const v = luma > 120 ? 255 : 0;
                    data[i] = data[i+1] = data[i+2] = v;
                }
                ctx.putImageData(imgData, 0, 0);
                resolve(canvas.toDataURL());
            });
        }

        fileInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (!files.length) return;
            files.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
            reviewArea.innerHTML = ''; slidesData = [];
            document.querySelector('.upload-zone').style.display = 'none';
            btnLaunch.style.display = 'block';

            if (!ocrWorker) {
                btnLaunch.disabled = true;
                ocrWorker = await Tesseract.createWorker('kor');
                await ocrWorker.setParameters({ tessedit_pageseg_mode: '6' });
                btnLaunch.disabled = false;
            }

            for (let i = 0; i < files.length; i++) {
                const objectURL = URL.createObjectURL(files[i]);
                const card = document.createElement('div');
                card.className = 'review-card'; card.id = `card-${i}`;
                card.innerHTML = `
                    <div class="preview-box"><span class="slide-badge" id="badge-${i}">SLIDE ${i + 1}</span><img src="${objectURL}" id="img-p-${i}"></div>
                    <div class="edit-box">
                        <div class="status-label"><span>속성 및 가사 교정</span><span id="st-${i}">AI 분석 중...</span></div>
                        <div class="editor-inputs"><input type="text" id="at-${i}" class="attribute-input" placeholder="절수"><textarea id="ly-${i}" class="lyrics-editor" placeholder="추출 중..."></textarea></div>
                    </div>
                `;
                reviewArea.appendChild(card);
                const imgP = document.getElementById(`img-p-${i}`);
                imgP.onload = async () => {
                    const processed = await preprocessImage(imgP);
                    try {
                        const result = await ocrWorker.recognize(processed);
                        let text = result.data.text.replace(/[0-9]+장|[a-zA-Z]/g, '').trim();
                        document.getElementById(`ly-${i}`).value = text;
                        document.getElementById(`st-${i}`).innerText = "추출 완료";
                        slidesData[i] = { index: i, fileUrl: objectURL, rawText: text };
                        checkAndClassifySlides();
                    } catch (e) { document.getElementById(`st-${i}`).innerText = "실패"; }
                };
            }
        });

        function checkAndClassifySlides() {
            if (slidesData.filter(Boolean).length !== fileInput.files.length) return;
            let currentVerse = "";
            for (let i = 0; i < slidesData.length; i++) {
                const rawText = document.getElementById(`ly-${i}`).value.trim();
                const compressed = rawText.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()\-+\s]/g, "");
                slidesData[i].rawText = rawText;
                slidesData[i].cleanText = compressed;
                
                // 후렴 자동 판별
                let isChorus = slidesData.some((s, idx) => idx !== i && s.cleanText === compressed && compressed.length > 5) || rawText.includes("후렴");
                slidesData[i].isChorus = isChorus;

                const attrInput = document.getElementById(`at-${i}`);
                if (attrInput.value) currentVerse = attrInput.value;
                slidesData[i].verseLabel = isChorus ? "후렴" : currentVerse;

                const card = document.getElementById(`card-${i}`);
                card.classList.toggle('chorus-highlight', isChorus);
                const badge = document.getElementById(`badge-${i}`);
                badge.innerText = `SLIDE ${i+1} (${slidesData[i].verseLabel})`;
                
                // 3글자 트리거 추출
                slidesData[i].firstWord = compressed.substring(0, 3);
                slidesData[i].lastWord = compressed.substring(compressed.length - 3);

                // 진행률 계산을 위한 단어셋 구축 (2글자 이상의 의미있는 음절 조합)
                const words = rawText.split(/\s+/).filter(w => w.length >= 2);
                slidesData[i].keywordsSet = new Set(words);
            }
        }

        btnLaunch.addEventListener('click', () => {
            checkAndClassifySlides();
            setupScreen.style.display = 'none'; liveScreen.style.display = 'flex';
            document.getElementById('btn-prev').disabled = false; document.getElementById('btn-next').disabled = false;
            btnMicToggle.style.display = 'flex'; btnProjector.style.display = 'flex';
            document.getElementById('btn-edit-back').style.display = 'flex';
            updateSlide(0);
        });

        function updateSlide(index) {
            if (index < 0 || index >= slidesData.length) return;
            currentIndex = index;
            slideView.src = slidesData[currentIndex].fileUrl;
            document.getElementById('page-counter').innerText = `${currentIndex + 1} / ${slidesData.length}`;

            // 진행률 리셋
            currentSlideKeywordsSet = slidesData[currentIndex].keywordsSet;
            detectedKeywordsSet = new Set();
            updateProgressBar(0);

            if (projectorWindow && !projectorWindow.closed) {
                projectorWindow.document.getElementById('p-img').src = slidesData[currentIndex].fileUrl;
            }

            document.getElementById('next-trigger').innerText = slidesData[currentIndex].lastWord;
        }

        function updateProgressBar(percent) {
            currentProgress = Math.floor(percent);
            progressBar.style.width = currentProgress + "%";
            progressText.innerText = currentProgress + "%";
            progressText.style.color = currentProgress >= 70 ? "var(--success)" : "var(--accent)";
        }

        function initSTT() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SR(); recognition.continuous = true; recognition.interimResults = true; recognition.lang = 'ko-KR';

            recognition.onstart = () => {
                isListening = true;
                document.getElementById('mic-status').innerHTML = `<span class="status-dot dot-on"></span> ON`;
                btnMicToggle.innerHTML = `🛑 인식 중지`;
            };

            recognition.onresult = (e) => {
                let interim = ''; let final = '';
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) final += e.results[i][0].transcript;
                    else interim += e.results[i][0].transcript;
                }
                const speech = (final || interim).trim();
                voicePreview.textContent = speech;
                
                // 가창 진행률 계산 로직
                const speechWords = speech.split(/\s+/);
                speechWords.forEach(w => {
                    if (currentSlideKeywordsSet.has(w)) detectedKeywordsSet.add(w);
                });

                if (currentSlideKeywordsSet.size > 0) {
                    const ratio = (detectedKeywordsSet.size / currentSlideKeywordsSet.size) * 100;
                    updateProgressBar(ratio);
                }

                checkSpeechMatch(speech.replace(/\s+/g, ''));
            };

            recognition.onend = () => { if (isListening) recognition.start(); };
            recognition.start();
        }

        function checkSpeechMatch(speech) {
            const now = Date.now();
            if (now - lastTriggerTime < 2000) return;

            // [명령어 점프] - 70% 룰 제외 (사용자 명시적 명령)
            if (speech.includes("일절") || speech.includes("1절")) { jumpToVerse("1절"); return; }
            if (speech.includes("이절") || speech.includes("2절")) { jumpToVerse("2절"); return; }
            if (speech.includes("삼절") || speech.includes("3절")) { jumpToVerse("3절"); return; }
            if (speech.includes("후렴") || speech.includes("코러스")) { jumpToVerse("후렴"); return; }

            // [순차 전환] - 70% 이상 불려졌을 때만 허용
            const cur = slidesData[currentIndex];
            if (currentProgress >= 70 && cur.lastWord && speech.includes(cur.lastWord)) {
                if (currentIndex < slidesData.length - 1) {
                    lastTriggerTime = now; updateSlide(currentIndex + 1);
                    return;
                }
            }

            // [글로벌 점프] - 70% 룰 제외 (갑작스러운 진행 변경 대응)
            for (let i = 0; i < slidesData.length; i++) {
                if (i === currentIndex) continue;
                if (slidesData[i].firstWord && speech.includes(slidesData[i].firstWord)) {
                    lastTriggerTime = now; updateSlide(i); break;
                }
            }
        }

        function jumpToVerse(label) {
            const idx = slidesData.findIndex(s => s.verseLabel === label);
            if (idx !== -1) { lastTriggerTime = Date.now(); updateSlide(idx); }
        }

        btnMicToggle.addEventListener('click', () => {
            if (!recognition) initSTT();
            if (isListening) { isListening = false; recognition.stop(); } else { recognition.start(); }
        });

        btnProjector.addEventListener('click', () => {
            projectorWindow = window.open('', 'P', 'width=1280,height=720');
            projectorWindow.document.write(`<html><body style="margin:0;background:#000;overflow:hidden;display:flex;justify-content:center;align-items:center;"><img id="p-img" src="${slidesData[currentIndex].fileUrl}" style="width:100vw;height:100vh;object-fit:fill;"></body></html>`);
        });

        document.getElementById('btn-next').onclick = () => { document.activeElement.blur(); updateSlide(currentIndex + 1); };
        document.getElementById('btn-prev').onclick = () => { document.activeElement.blur(); updateSlide(currentIndex - 1); };
        document.getElementById('btn-edit-back').onclick = () => { setupScreen.style.display='flex'; liveScreen.style.display='none'; };

        document.addEventListener('keydown', (e) => {
            if (liveScreen.style.display === 'flex') {
                if (e.key >= '0' && e.key <= '9') { jumpBuffer += e.key; document.getElementById('jump-hud').style.display='flex'; document.getElementById('hud-number').innerText=jumpBuffer; }
                if (e.key === 'Enter' && jumpBuffer) { updateSlide(parseInt(jumpBuffer)-1); jumpBuffer=""; document.getElementById('jump-hud').style.display='none'; }
                if (e.key === 'ArrowRight' || e.key === ' ') updateSlide(currentIndex+1);
                if (e.key === 'ArrowLeft') updateSlide(currentIndex-1);
            }
        });
    </script>
</body>
</html>
