<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 찬양 마스터 프로 v3.0 (인식률 대폭 강화 버전)</title>
    <!-- 고성능 AI OCR 엔진 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --text-color: #f1f5f9;
            --accent-color: #3b82f6;
            --accent-neon: #00f0ff;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --panel-bg: rgba(17, 24, 39, 0.85);
            --border-color: rgba(59, 130, 246, 0.2);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Pretendard', -apple-system, system-ui, sans-serif;
            overflow: hidden; height: 100vh; display: flex; flex-direction: column;
        }

        /* 설정 화면 */
        #setup-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #090d16; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10; overflow-y: auto; padding: 20px 0;
        }

        #setup-container.hidden { transform: translateY(-100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .setup-box { width: 90%; max-width: 750px; background: #111827; padding: 30px; border-radius: 16px; border: 1px solid var(--border-color); box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .file-zone { border: 2px dashed #3b82f6; padding: 30px; border-radius: 12px; cursor: pointer; background: #1f2937; text-align: center; margin-bottom: 20px; transition: all 0.3s; }
        .file-zone:hover { border-color: var(--accent-neon); background: #253346; }
        
        .editor-list { max-height: 280px; overflow-y: auto; margin-bottom: 20px; padding-right: 5px; }
        .edit-card { display: flex; align-items: center; gap: 12px; background: #1f2937; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .edit-card img { width: 90px; height: 55px; object-fit: contain; background: #000; border-radius: 4px; }
        .edit-card input.verse-prop { width: 60px; padding: 8px; background: #0f172a; color: #ff007f; border: 1px solid #ff007f; border-radius: 6px; text-align: center; font-weight: bold; }
        .edit-card textarea.lyrics-editor { flex: 1; height: 45px; background: #0f172a; color: #fff; border: 1px solid var(--border-color); border-radius: 6px; padding: 8px; font-size: 0.9rem; resize: none; }

        /* 발표 모드 */
        #presentation-container { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; background: #000; }
        #slide-image { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* 컨트롤 패널 */
        #control-panel { padding: 15px 30px; display: flex; justify-content: center; align-items: center; gap: 15px; background: #0f172a; border-top: 1px solid var(--border-color); z-index: 5; }
        button { background: #1f2937; color: white; border: 1px solid var(--border-color); padding: 10px 22px; font-size: 0.95rem; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
        button:hover { background: #374151; border-color: var(--accent-neon); }
        button.success { background: var(--success-color); border-color: var(--success-color); }
        button.success:hover { background: #059669; }
        button.warning { background: #d97706; border-color: #d97706; }

        /* 모니터 HUD */
        #debug-window { position: absolute; top: 20px; right: 20px; width: 300px; background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 18px; font-size: 0.85rem; z-index: 5; backdrop-filter: blur(8px); box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        #debug-window h3 { margin: 0 0 12px 0; font-size: 0.95rem; color: var(--accent-neon); border-bottom: 1px solid rgba(59, 130, 246, 0.3); padding-bottom: 6px; }
        .debug-item { margin-bottom: 10px; display: flex; flex-direction: column; gap: 3px; }
        .debug-label { color: #94a3b8; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; }
        #recognized-text { color: #f59e0b; font-style: italic; min-height: 35px; word-break: break-all; background: rgba(0,0,0,0.3); padding: 6px; border-radius: 4px; }
        #next-trigger-words { color: #06b6d4; font-weight: 500; background: rgba(6, 182, 212, 0.1); padding: 6px; border-radius: 4px; }

        /* 숫자 패드 슬라이드 이동 HUD */
        #jump-hud { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(239, 68, 68, 0.95); color: white; padding: 12px 28px; border-radius: 30px; font-size: 1.4rem; font-weight: bold; box-shadow: 0 0 20px rgba(239, 68, 68, 0.6); display: none; z-index: 100; animation: pulse 1.5s infinite; border: 2px solid #fff; }
        @keyframes pulse { 0% { opacity: 0.9; } 50% { opacity: 1; transform: translateX(-50%) scale(1.03); } 100% { opacity: 0.9; } }
    </style>
</head>
<body>

    <!-- [1단계] 설정 및 고정밀 가사 교정 에디터 -->
    <div id="setup-container">
        <div class="setup-box">
            <h2 style="margin-top:0; color: var(--accent-neon); text-align:center;">AI 찬양 자동 인식 시스템 v3.0</h2>
            <p style="color:#94a3b8; font-size:0.88rem; text-align:center; margin-bottom:20px;">
                PPT에서 이미지로 내보낸 파일들을 넣어주세요. <br>
                <span style="color:#60a5fa; font-weight:bold;">[인식률 업그레이드]: 악보 노이즈를 피해 하단 가사 영역만 타겟 크롭하여 텍스트를 추출합니다.</span>
            </p>
            
            <div class="file-zone" onclick="document.getElementById('file-input').click()">
                <span id="file-status">📂 여기에 찬양 슬라이드 이미지들을 드래그하거나 클릭하세요</span>
                <input type="file" id="file-input" multiple accept="image/*" style="display:none;">
            </div>

            <div class="editor-list" id="editor-list-container">
                <!-- 파일 등록 시 AI가 추출한 가사 편집 카드가 여기에 생성됨 -->
            </div>

            <button id="btn-start" class="success" style="width:100%; justify-content:center; padding:14px; font-size:1.1rem;" disabled>가사 분석 및 준비 대기 중...</button>
        </div>
    </div>

    <!-- [2단계] 메인 뷰어 -->
    <div id="presentation-container">
        <img id="slide-image" src="" alt="라이브 악보 화면">

        <!-- 슬라이드 고속 이동 HUD -->
        <div id="jump-hud">🎯 이동 타겟 슬라이드 번호: <span id="jump-num"></span> (Enter 치면 이동)</div>

        <!-- 모니터링 시스템 -->
        <div id="debug-window">
            <h3>SYSTEM STATUS</h3>
            <div class="debug-item"><span class="debug-label">마이크 상태</span> <span id="stt-status" style="color:#ef4444; font-weight:bold;">🔴 꺼짐</span></div>
            <div class="debug-item"><span class="debug-label">현재 슬라이드 위치</span> <span id="current-index-view" style="font-size:1.1rem; font-weight:bold;">0 / 0</span></div>
            <div class="debug-item"><span class="debug-label">실시간 음성 인식 피드</span> <div id="recognized-text">소리 감지 대기 중...</div></div>
            <div class="debug-item"><span class="debug-label">현재 장 전환 매칭 단어 (끝/첫)</span> <div id="next-trigger-words">-</div></div>
        </div>
    </div>

    <!-- 하단 제어 바 -->
    <div id="control-panel">
        <button id="btn-setup-back" class="warning">📝 가사 재교정</button>
        <button id="btn-prev">이전 (←)</button>
        <button id="btn-stt" class="success">🎤 음성인식 시작</button>
        <button id="btn-next">다음 (→)</button>
        <button id="btn-projector" style="background:#4b5563; border-color:#6b7280;">📺 프로젝터 송출</button>
    </div>

    <script>
        let slidesData = [];
        let currentIndex = 0;
        let recognition;
        let isListening = false;
        let lastTriggerTime = 0;
        let projectorWindow = null;

        // 고속 슬라이드 점프 데이터 변수
        let jumpBuffer = "";
        let jumpTimeout = null;

        const setupContainer = document.getElementById('setup-container');
        const fileInput = document.getElementById('file-input');
        const fileStatus = document.getElementById('file-status');
        const editorListContainer = document.getElementById('editor-list-container');
        const btnStart = document.getElementById('btn-start');
        
        const slideImage = document.getElementById('slide-image');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const btnStt = document.getElementById('btn-stt');
        const btnSetupBack = document.getElementById('btn-setup-back');
        const btnProjector = document.getElementById('btn-projector');
        
        const sttStatus = document.getElementById('stt-status');
        const currentIndexView = document.getElementById('current-index-view');
        const recognizedTextEl = document.getElementById('recognized-text');
        const nextTriggerWordsEl = document.getElementById('next-trigger-words');
        
        const jumpHud = document.getElementById('jump-hud');
        const jumpNum = document.getElementById('jump-num');

        // [핵심] 가사 영역 타겟 크롭 전처리 함수
        function cropLyricsArea(imageFile) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = URL.createObjectURL(imageFile);
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // 가사가 집중적으로 위치하는 악보 하단 35% 영역만 잘라내기 설계
                    const cropTop = img.height * 0.65;
                    const cropHeight = img.height * 0.35;
                    
                    canvas.width = img.width;
                    canvas.height = cropHeight;
                    
                    // 이미지 그리기 및 정밀 이진화 전처리(Contrast Max)로 가로선 노이즈 감쇠
                    ctx.drawImage(img, 0, cropTop, img.width, cropHeight, 0, 0, img.width, cropHeight);
                    
                    let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    let data = imgData.data;
                    for (let i = 0; i < data.length; i += 4) {
                        let brightness = 0.34 * data[i] + 0.5 * data[i + 1] + 0.16 * data[i + 2];
                        let v = (brightness > 130) ? 255 : 0; // 임계값 이진화
                        data[i] = data[i+1] = data[i+2] = v;
                    }
                    ctx.putImageData(imgData, 0, 0);
                    
                    resolve(canvas.toDataURL());
                };
            });
        }

        // 이미지 파일 선택 및 고정밀 OCR 일괄 처리
        fileInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            files.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true, sensitivity: 'base'}));
            fileStatus.textContent = `⏳ 최적화 가사 분석 엔진 로딩 중...`;
            editorListContainer.innerHTML = "";
            btnStart.disabled = true;

            // OCR 최적화 설정 파라미터 세팅
            const worker = await Tesseract.createWorker('kor');
            await worker.setParameters({
                tessedit_pageseg_mode: '6', // 단일 텍스트 블록 간주 가이드
                tessedit_char_whitelist: ' 가나다라마바사아자차카타파하거너더러머버서어저처커터퍼허고노도로모보소오조초코토포호구누두루무부수우주추쿠투푸후그느드르므브스의지치크트프히기니디리미비시이지치키티피히요야얘얘여유외와워위의각간갇갈감갑갓강갖같앞오오온올옴옵옹왕외우운울움웅워위유육율으은을음읍응의이인일임입잇있자잔잘잠잡잣장잦재쟁저전절점접젓정제조족존졸좀좁종좋좌죄주죽준줄줌중쥐즉즌즐즘즙증지직진질짐집짓징짜째쩌쪼쭈찌가사후렴절말씀주의예수크신사랑'
            });

            slidesData = [];
            let currentInferredVerse = "1절"; // 절수 추적 상속자

            for (let i = 0; i < files.length; i++) {
                fileStatus.textContent = `⏳ [${i + 1}/${files.length}] 가사 정밀 자르기 및 추출 중...`;
                
                // 가사 영역만 타겟 크롭 가공된 이미지 생성
                const processedImgDataUrl = await cropLyricsArea(files[i]);
                
                let detectedText = "";
                try {
                    const result = await worker.recognize(processedImgDataUrl);
                    detectedText = result.data.text.replace(/\s+/g, ' ').trim();
                } catch (err) {
                    console.error(err);
                }

                // AI 절수 자동 감지 로직
                const verseMatch = detectedText.match(/([1-5])\s*절/);
                if (verseMatch) {
                    currentInferredVerse = verseMatch[1] + "절";
                } else if (detectedText.includes("후렴") || detectedText.includes("코러스")) {
                    currentInferredVerse = "후렴";
                }

                slidesData.push({
                    file: files[i],
                    url: URL.createObjectURL(files[i]),
                    verseProp: currentInferredVerse,
                    rawText: detectedText
                });

                // UI 편집 카드 생성
                const card = document.createElement('div');
                card.className = 'edit-card';
                card.innerHTML = `
                    <img src="${slidesData[i].url}">
                    <input type="text" class="verse-prop" value="${slidesData[i].verseProp}" placeholder="절수" data-index="${i}">
                    <textarea class="lyrics-editor" data-index="${i}" placeholder="추출된 가사가 없습니다. 여기에 직접 입력해 주세요.">${slidesData[i].rawText}</textarea>
                `;
                editorListContainer.appendChild(card);
            }

            await worker.terminate();
            fileStatus.textContent = `✅ 총 ${files.length}개의 슬라이드 분석 및 크롭 세팅 완료!`;
            btnStart.disabled = false;
            btnStart.textContent = "가사 교정 완료 및 시스템 시작";
        });

        // 시스템 발표 모드 진입 및 키워드 생성
        btnStart.addEventListener('click', () => {
            if (slidesData.length === 0) return;

            // 사용자가 수동 교정한 가사 데이터를 데이터셋에 최종 주입
            const verseInputs = document.querySelectorAll('.verse-prop');
            const textAreas = document.querySelectorAll('.lyrics-editor');

            slidesData.forEach((slide, i) => {
                slide.verseProp = verseInputs[i].value.trim() || `${i+1}장`;
                slide.rawText = textAreas[i].value.replace(/\s+/g, '').trim(); // 띄어쓰기 완전 압축 처리

                // 음성 3글자 매칭 키워드 배열 구축
                slide.firstKeyword = slide.rawText.substring(0, 3);
                slide.lastKeyword = slide.rawText.substring(slide.rawText.length - 3);
            });

            setupContainer.classList.add('hidden');
            updateSlide(0);
        });

        // 슬라이드 화면 전환 및 연동 처리
        function updateSlide(index) {
            if (index < 0 || index >= slidesData.length) return;
            currentIndex = index;

            const curSlide = slidesData[currentIndex];
            slideImage.src = curSlide.url;
            currentIndexView.textContent = `${currentIndex + 1} / ${slidesData.length} (${curSlide.verseProp})`;

            // 대기중인 전환 키워드 모니터에 시각화
            nextTriggerWordsEl.innerHTML = `
                <span style='color:#ef4444;'>[끝]</span> ${curSlide.lastKeyword || '없음'} ➔ 다음장<br>
                <span style='color:#a855f7;'>[글로벌 첫]</span> 각 장 시작 3글자 감지 시 해당 장 이동
            `;

            // 프로젝터 팝업 스크린 무지연 데이터 동기화 전송
            if (projectorWindow && !projectorWindow.closed) {
                const projImg = projectorWindow.document.getElementById('proj-img');
                if (projImg) projImg.src = curSlide.url;
            }
        }

        function nextSlide() { if (currentIndex < slidesData.length - 1) updateSlide(currentIndex + 1); }
        function prevSlide() { if (currentIndex > 0) updateSlide(currentIndex - 1); }

        // 수동 제어 버튼 바인딩
        btnNext.addEventListener('click', () => { document.activeElement.blur(); nextSlide(); });
        btnPrev.addEventListener('click', () => { document.activeElement.blur(); prevSlide(); });
        btnSetupBack.addEventListener('click', () => {
            document.activeElement.blur();
            setupContainer.classList.remove('hidden');
        });

        // [프로젝터 송출] 독립 윈도우 생성 모듈
        btnProjector.addEventListener('click', () => {
            document.activeElement.blur();
            if (projectorWindow && !projectorWindow.closed) {
                projectorWindow.focus();
                return;
            }

            projectorWindow = window.open('', 'PraiseProjector', 'width=960,height=540,dependencies=yes,scrollbars=no');
            projectorWindow.document.write(`
                <html>
                <head>
                    <title>찬양 송출 스크린 (F11을 눌러 전체화면)</title>
                    <style>
                        body { margin: 0; padding: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
                        img { width: 100vw; height: 100vh; object-fit: fill; border: none; }
                    </style>
                </head>
                <body>
                    <img id="proj-img" src="${slidesData[currentIndex] ? slidesData[currentIndex].url : ''}">
                </body>
                </html>
            `);
            projectorWindow.document.close();
        });

        // 키보드 방향키 및 숫자패드 이동 핸들러 (포커스 꼬임 방지)
        document.addEventListener('keydown', (e) => {
            if (!setupContainer.classList.contains('hidden')) return;

            // 숫자 패드를 타이핑하는 경우 수집 거동
            if (/^\d$/.test(e.key)) {
                document.activeElement.blur(); // 활성화 포커스 해제 버그 차단
                clearTimeout(jumpTimeout);
                jumpBuffer += e.key;
                jumpNum.textContent = jumpBuffer;
                jumpHud.style.display = "block";

                jumpTimeout = setTimeout(() => { cancelJumpMode(); }, 4000); // 4초 대기 시 취소
                return;
            }

            // 숫자가 쌓인 상태에서 Enter 클릭 시 타겟 점프 실행
            if (e.key === 'Enter' && jumpBuffer !== "") {
                e.preventDefault();
                e.stopPropagation();
                const targetIdx = parseInt(jumpBuffer, 10) - 1;
                if (targetIdx >= 0 && targetIdx < slidesData.length) {
                    updateSlide(targetIdx);
                } else {
                    alert("해당 번호의 슬라이드가 존재하지 않습니다.");
                }
                cancelJumpMode();
                return;
            }

            if (e.key === 'Escape') { cancelJumpMode(); return; }

            // 기본 방향키 조작
            if (e.key === 'ArrowRight' || e.key === ' ') { nextSlide(); }
            if (e.key === 'ArrowLeft') { prevSlide(); }
        });

        function cancelJumpMode() {
            jumpBuffer = "";
            jumpHud.style.display = "none";
            clearTimeout(jumpTimeout);
        }

        // Web Speech API 기반 정밀 음성 모듈
        function initSpeechRecognition() {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!window.SpeechRecognition) {
                alert("크롬 브라우저 혹은 엣지 브라우저를 이용하셔야 음성 제어가 연동됩니다.");
                return;
            }

            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'ko-KR';

            recognition.onstart = () => {
                isListening = true;
                sttStatus.textContent = "🟢 ON (음성 감지 중)";
                sttStatus.style.color = "#10b981";
                btnStt.textContent = "🛑 음성인식 중지";
                btnStt.style.background = "#ef4444";
            };

            recognition.onend = () => {
                if (isListening) {
                    recognition.start(); // 무중단 지속 자동 러닝
                } else {
                    sttStatus.textContent = "🔴 꺼짐";
                    sttStatus.style.color = "#ef4444";
                    btnStt.textContent = "🎤 음성인식 시작";
                    btnStt.style.background = "";
                }
            };

            recognition.onerror = (event) => {
                console.error("STT 에러 발생:", event.error);
                if (event.error === 'not-allowed') {
                    alert("마이크 사용 권한이 거부되었습니다. 주소창 좌측 자물쇠 아이콘을 눌러 권한을 허용해 주세요.");
                    isListening = false;
                    recognition.stop();
                }
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
                    else interimTranscript += event.results[i][0].transcript;
                }

                const speechInput = (finalTranscript || interimTranscript).replace(/\s+/g, ""); // 공백 압축 대조
                if (!speechInput) return;
                
                recognizedTextEl.textContent = speechInput;
                checkSpeechMatch(speechInput);
            };
        }

        // 3단계 입체 음성 판정 로직 (절수 이동 ➔ 마지막단어 다음장 ➔ 첫단어 점프)
        function checkSpeechMatch(speech) {
            const now = Date.now();
            if (now - lastTriggerTime < 2000) return; // 2초 가동 안전 쿨다운

            // [1순위] 구어체 절수 점프 감지
            const targetVerse = parseVerseCommand(speech);
            if (targetVerse) {
                // 해당 절을 가진 최초의 슬라이드 탐색
                for (let i = 0; i < slidesData.length; i++) {
                    if (slidesData[i].verseProp === targetVerse) {
                        lastTriggerTime = now;
                        updateSlide(i);
                        recognizedTextEl.textContent = `[절 점프 감지] ➔ ${targetVerse} 시작 구절로 워프`;
                        return;
                    }
                }
            }

            // [2순위] 현재 장의 마지막 단어가 들렸을 때 다음 장 자동 전환
            const currentSlide = slidesData[currentIndex];
            if (currentSlide.lastKeyword && speech.includes(currentSlide.lastKeyword)) {
                if (currentIndex < slidesData.length - 1) {
                    lastTriggerTime = now;
                    nextSlide();
                    recognizedTextEl.textContent = `[다음장 전환 감지] 단어: ${currentSlide.lastKeyword}`;
                    return;
                }
            }

            // [3순위] 전체 슬라이드를 대상으로 시작 구절이 들렸는지 글로벌 탐색
            for (let i = 0; i < slidesData.length; i++) {
                if (i === currentIndex) continue; // 현재 페이지는 스킵
                const targetSlide = slidesData[i];
                if (targetSlide.firstKeyword && speech.includes(targetSlide.firstKeyword)) {
                    lastTriggerTime = now;
                    updateSlide(i);
                    recognizedTextEl.textContent = `[글로벌 점프 감지] ${i+1}번 장으로 점프: ${targetSlide.firstKeyword}`;
                    break;
                }
            }
        }

        // 음성 문자열을 규격화된 절 속성 데이터로 변환하는 서브 파서
        function parseVerseCommand(speech) {
            if (speech.includes("1절") || speech.includes("일절")) return "1절";
            if (speech.includes("2절") || speech.includes("이절")) return "2절";
            if (speech.includes("3절") || speech.includes("삼절")) return "3절";
            if (speech.includes("4절") || speech.includes("사절")) return "4절";
            if (speech.includes("5절") || speech.includes("오절")) return "5절";
            if (speech.includes("후렴") || speech.includes("코러스") || speech.includes("후렴구")) return "후렴";
            return null;
        }

        btnStt.addEventListener('click', () => {
            if (!recognition) initSpeechRecognition();
            if (isListening) {
                isListening = false;
                recognition.stop();
            } else {
                recognition.start();
            }
        });
    </script>
