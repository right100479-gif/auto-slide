<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Praise Master Pro - 통합 스마트 세트리스트 시스템 v7.4</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #090d16;
            --card-bg: #131b2e;
            --card-border: #1e293b;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.15);
            --success: #10b981;
            --danger: #ef4444;
            --chorus: #ec4899;
            --chorus-glow: rgba(236, 72, 153, 0.2);
            --verse: #a855f7;
            --verse-glow: rgba(168, 85, 247, 0.2);
            --text-main: #f8fafc;
            --text-muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Urbanist', 'Pretendard', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* [STEP 1] SETUP SCREEN */
        #setup-screen { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1050px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2.8rem; font-weight: 700; letter-spacing: -1px; color: var(--text-main); }
        .header h1 span { color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); }
        .header p { color: var(--text-muted); margin-top: 10px; font-size: 1.1rem; }

        .conti-zone { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 25px; margin-bottom: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .conti-zone h3 { margin-bottom: 10px; font-size: 1.2rem; color: var(--accent); display: flex; align-items: center; gap: 8px; }
        .conti-input { width: 100%; height: 110px; background: #090d16; color: var(--text-main); border: 1px solid var(--card-border); border-radius: 10px; padding: 15px; font-size: 1rem; resize: none; outline: none; transition: 0.2s; font-family: inherit; line-height: 1.5; }
        .conti-input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(56, 189, 248, 0.1); }

        .upload-zone { border: 2px dashed var(--accent); background: rgba(56, 189, 248, 0.02); border-radius: 20px; padding: 45px 30px; text-align: center; cursor: pointer; transition: all 0.3s ease; }
        .upload-zone:hover { background: rgba(56, 189, 248, 0.05); border-color: var(--text-main); }
        .upload-zone.compact { padding: 15px 30px; border-radius: 12px; background: rgba(56, 189, 248, 0.04); display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; }

        #review-area { margin-top: 30px; display: grid; gap: 20px; }
        .review-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 20px; display: grid; grid-template-columns: 320px 1fr; gap: 25px; align-items: start; position: relative; }
        .review-card.chorus-highlight { border: 2px solid var(--chorus) !important; box-shadow: 0 4px 20px var(--chorus-glow); }

        .preview-box { position: relative; width: 100%; height: 180px; border-radius: 12px; overflow: hidden; border: 1px solid var(--card-border); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; background-color: #05070c; }
        .preview-box:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }
        .preview-box img { width: 100%; height: 100%; object-fit: contain; }
        .slide-badge { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.85); padding: 5px 12px; border-radius: 6px; font-size: 0.8rem; color: var(--accent); font-weight: bold; z-index: 2; border: 1px solid rgba(56, 189, 248, 0.3); }

        .editor-inputs { display: grid; grid-template-columns: 160px 100px 1fr; gap: 15px; }
        .song-title-input { width: 100%; height: 110px; background: #090d16; color: var(--accent); font-weight: bold; border: 1px solid var(--card-border); border-radius: 8px; padding: 10px; text-align: center; outline: none; }
        .attribute-input { width: 100%; height: 110px; background: #090d16; color: #facc15; font-weight: bold; border: 1px solid var(--card-border); border-radius: 8px; padding: 10px; text-align: center; outline: none; }
        .lyrics-editor { width: 100%; height: 110px; background: #090d16; color: var(--text-main); border: 1px solid var(--card-border); border-radius: 8px; padding: 12px; font-size: 1.1rem; resize: none; outline: none; line-height: 1.4; }

        /* [STEP 2] LIVE/BOTTOM BAR */
        #live-screen { display: none; flex: 1; background: #000; position: relative; justify-content: center; align-items: center; }
        #slide-view { max-width: 100%; max-height: 100%; object-fit: contain; }
        .bottom-bar { padding: 20px; background: var(--card-bg); border-top: 1px solid var(--card-border); display: flex; justify-content: center; gap: 15px; z-index: 20; }
        .btn { padding: 12px 28px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; color: white; transition: 0.2s; }
        .btn-ghost { background: transparent; border: 1px solid var(--card-border); }
        .btn-primary { background: var(--accent); color: var(--bg-dark); }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }
        .btn-warning { background: #eab308; color: var(--bg-dark); }
        
        #image-modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(9, 13, 22, 0.95); z-index: 2000; justify-content: center; align-items: center; }
        #image-modal.active { display: flex; }
        #modal-img { max-width: 90%; max-height: 85%; border: 2px solid var(--accent); border-radius: 12px; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="container">
            <div class="header">
                <h1>AI PRAISE MASTER <span>PRO v7.4</span></h1>
                <p>예배 준비 완료 후 프로젝트를 저장하고, 다음 예배 때 즉시 불러오세요.</p>
            </div>
            
            <div class="conti-zone">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                    <h3><i class="fa-solid fa-list-check"></i> 예배 콘티 및 슬라이드 수량 (제목 (수량))</h3>
                    <button class="btn btn-warning" onclick="syncLyricsWithConti()" style="padding: 5px 15px;"><i class="fa-solid fa-rotate"></i> 수량 설정 반영</button>
                </div>
                <textarea id="conti-input" class="conti-input" placeholder="예시: 내 모습 이대로 (4)">1. 내 모습 이대로 (4)</textarea>
            </div>

            <!-- 세이브/로드 기능 버튼 -->
            <div style="display: flex; gap: 15px; margin-bottom: 20px; justify-content: center;">
                <button class="btn btn-primary" onclick="saveProject()"><i class="fa-solid fa-floppy-disk"></i> 프로젝트 저장</button>
                <button class="btn btn-ghost" onclick="document.getElementById('load-file').click()"><i class="fa-solid fa-folder-open"></i> 프로젝트 불러오기</button>
                <input type="file" id="load-file" accept=".praise" style="display:none;">
            </div>

            <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
                <i class="fa-solid fa-file-image" style="font-size:3rem; color:var(--accent);"></i>
                <h3 id="upload-title">이미지 선택 (이미지들을 드래그하여 추가하세요)</h3>
                <input type="file" id="file-input" multiple accept="image/*" style="display:none;">
            </div>

            <div style="display: flex; gap: 15px; margin-top: 20px; justify-content: center;">
                <button class="btn btn-primary" id="btn-add-manual"><i class="fa-solid fa-plus"></i> 슬라이드 직접 추가</button>
                <button class="btn btn-ghost" onclick="location.reload()"><i class="fa-solid fa-trash-can"></i> 전체 초기화</button>
            </div>

            <div id="review-area"></div>
            
            <div style="text-align: center; margin-top: 40px; padding-bottom: 80px;">
                <button id="btn-launch" class="btn btn-success" style="display:none; width:100%; justify-content:center; font-size:1.3rem; padding: 18px;">
                    <i class="fa-solid fa-play"></i> 시스템 시작
                </button>
            </div>
        </div>
    </div>

    <div id="live-screen">
        <img id="slide-view" src="">
    </div>

    <!-- [STEP 3] BOTTOM BAR -->
    <div class="bottom-bar">
        <button class="btn btn-ghost" onclick="location.reload()">나가기</button>
        <button class="btn btn-ghost" id="btn-next">다음</button>
    </div>

    <div id="image-modal" onclick="this.classList.remove('active')">
        <div class="modal-content-wrapper"><img id="modal-img" src=""></div>
    </div>

    <script>
        let slidesData = [];

        // 데이터 저장
        async function saveProject() {
            const dataToSave = {
                conti: document.getElementById('conti-input').value,
                slides: await Promise.all(slidesData.map(async s => ({
                    ...s,
                    data: await blobToBase64(s.fileUrl)
                })))
            };
            const blob = new Blob([JSON.stringify(dataToSave)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'praise_project.praise';
            a.click();
        }

        // 데이터 불러오기
        document.getElementById('load-file').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = async (event) => {
                const project = JSON.parse(event.target.result);
                document.getElementById('conti-input').value = project.conti;
                slidesData = await Promise.all(project.slides.map(async s => ({
                    ...s,
                    fileUrl: await base64ToBlobUrl(s.data)
                })));
                rebuildReviewArea();
            };
            reader.readAsText(e.target.files[0]);
        };

        // Helpers
        async function blobToBase64(url) {
            const response = await fetch(url);
            const blob = await response.blob();
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(blob);
            });
        }

        async function base64ToBlobUrl(base64) {
            const response = await fetch(base64);
            const blob = await response.blob();
            return URL.createObjectURL(blob);
        }

        // 기존 렌더링 함수 유지
        function rebuildReviewArea() {
            document.getElementById('review-area').innerHTML = '';
            slidesData.forEach((slide, i) => addSlideCardDOM(i, slide.fileUrl, slide.songTitle, slide.verseLabel, slide.rawText, slide.isManual));
            btnLaunch.style.display = 'block';
        }

        function addSlideCardDOM(i, url, songTitle, verse, text, isManual) {
            const div = document.createElement('div');
            div.className = 'review-card';
            div.innerHTML = `
                <div class="preview-box" onclick="document.getElementById('modal-img').src='${url}'; document.getElementById('image-modal').classList.add('active')">
                    <img src="${url}" id="img-p-${i}">
                </div>
                <div class="editor-inputs">
                    <input type="text" value="${songTitle}" class="song-title-input" oninput="slidesData[${i}].songTitle=this.value">
                    <input type="text" value="${verse}" class="attribute-input" oninput="slidesData[${i}].verseLabel=this.value">
                    <textarea class="lyrics-editor" oninput="slidesData[${i}].rawText=this.value">${text}</textarea>
                </div>
            `;
            document.getElementById('review-area').appendChild(div);
        }

        fileInput.addEventListener('change', (e) => {
            Array.from(e.target.files).forEach(f => {
                const url = URL.createObjectURL(f);
                slidesData.push({ fileUrl: url, songTitle: "새 찬양", verseLabel: "1절", rawText: "", isManual: false });
                addSlideCardDOM(slidesData.length-1, url, "새 찬양", "1절", "", false);
            });
            btnLaunch.style.display = 'block';
        });

        document.getElementById('btn-add-manual').addEventListener('click', () => {
            slidesData.push({ fileUrl: '', songTitle: "새 찬양", verseLabel: "1절", rawText: "", isManual: true });
            addSlideCardDOM(slidesData.length-1, '', "새 찬양", "1절", "", true);
            btnLaunch.style.display = 'block';
        });

        btnLaunch.onclick = () => { setupScreen.style.display = 'none'; liveScreen.style.display = 'flex'; };

    </script>
</body>
</html>
