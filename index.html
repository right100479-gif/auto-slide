<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Praise Master Pro - 세이브 통합 시스템 v7.3</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #090d16;
            --card-bg: #131b2e;
            --card-border: #1e293b;
            --accent: #38bdf8;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #f8fafc;
        }

        * { box-sizing: border-box; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Pretendard', sans-serif; height: 100vh; display: flex; flex-direction: column; }

        /* [Setup Screen] */
        #setup-screen { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; }
        .upload-zone { border: 2px dashed var(--accent); padding: 40px; border-radius: 16px; text-align: center; cursor: pointer; margin-bottom: 20px; transition: 0.3s; }
        
        .review-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 20px; display: grid; grid-template-columns: 320px 1fr; gap: 20px; margin-bottom: 20px; }
        .preview-box { width: 320px; height: 180px; border-radius: 8px; overflow: hidden; border: 1px solid var(--card-border); cursor: pointer; }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .editor-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .input-field { background: #090d16; color: white; border: 1px solid var(--card-border); border-radius: 6px; padding: 10px; width: 100%; }
        .lyrics-textarea { grid-column: span 2; height: 100px; resize: none; }
        
        /* [Live Screen] */
        #live-screen { display: none; flex: 1; background: #000; position: relative; }
        #slide-view { width: 100%; height: 100%; object-fit: contain; }
        #monitor { position: absolute; top: 20px; right: 20px; width: 300px; background: rgba(19, 27, 46, 0.9); padding: 15px; border-radius: 12px; z-index: 10; }
        
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-success { background: var(--success); color: white; }
        .btn-accent { background: var(--accent); color: var(--bg-dark); }
        .btn-danger { background: var(--danger); color: white; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1>AI Praise Master <span>v7.3</span></h1>
                <div>
                    <button class="btn btn-accent" onclick="saveProject()"><i class="fa-solid fa-download"></i> 프로젝트 저장</button>
                    <button class="btn btn-success" onclick="document.getElementById('file-load').click()"><i class="fa-solid fa-upload"></i> 프로젝트 불러오기</button>
                    <input type="file" id="file-load" style="display:none;" accept=".json">
                </div>
            </div>
            
            <textarea id="conti-input" class="input-field" style="margin-bottom:20px;" placeholder="찬양 콘티 입력..."></textarea>
            
            <div class="upload-zone" onclick="document.getElementById('file-input').click()">
                <h3>이미지 선택</h3>
                <input type="file" id="file-input" multiple accept="image/*" style="display:none;">
            </div>
            
            <div id="review-area"></div>
            <button id="btn-launch" class="btn btn-success" style="display:none; width:100%; margin-top:20px; padding:15px;">시스템 시작</button>
        </div>
    </div>

    <div id="live-screen">
        <img id="slide-view">
        <div id="monitor">
            <div id="voice-preview" style="color:var(--accent);">마이크 대기 중...</div>
        </div>
    </div>

    <script>
        let slidesData = [];

        // 프로젝트 저장: 모든 이미지를 Base64로 변환하여 JSON 저장
        async function saveProject() {
            const project = {
                conti: document.getElementById('conti-input').value,
                slides: await Promise.all(slidesData.map(async s => {
                    const base64 = await toBase64(s.url);
                    return { ...s, data: base64 };
                }))
            };
            const blob = new Blob([JSON.stringify(project)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'praise_project.json';
            a.click();
        }

        // 이미지 Base64 변환
        async function toBase64(url) {
            const response = await fetch(url);
            const blob = await response.blob();
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(blob);
            });
        }

        // 프로젝트 불러오기
        document.getElementById('file-load').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const project = JSON.parse(event.target.result);
                document.getElementById('conti-input').value = project.conti;
                slidesData = project.slides.map(s => ({
                    ...s, 
                    url: s.data // Base64 그대로 사용
                }));
                rebuildReviewArea();
            };
            reader.readAsText(file);
        };

        function addSlide(url, text = "") {
            const i = slidesData.length;
            slidesData.push({ id: i, title: "새 찬양", verse: "1절", text: text, url: url });
            renderSlideCard(i);
            document.getElementById('btn-launch').style.display = 'block';
        }

        function renderSlideCard(i) {
            const div = document.createElement('div');
            div.className = 'review-card';
            div.innerHTML = `
                <div class="preview-box"><img src="${slidesData[i].url}"></div>
                <div>
                    <button class="btn btn-accent" onclick="searchLyrics(${i})"><i class="fa-solid fa-magnifying-glass"></i> 웹 검색</button>
                    <div class="editor-inputs">
                        <input type="text" class="input-field" value="${slidesData[i].title}" oninput="slidesData[${i}].title=this.value">
                        <input type="text" class="input-field" value="${slidesData[i].verse}" oninput="slidesData[${i}].verse=this.value">
                        <textarea class="input-field lyrics-textarea" oninput="slidesData[${i}].text=this.value">${slidesData[i].text}</textarea>
                    </div>
                </div>
            `;
            document.getElementById('review-area').appendChild(div);
        }

        function rebuildReviewArea() {
            document.getElementById('review-area').innerHTML = '';
            slidesData.forEach((_, i) => renderSlideCard(i));
            document.getElementById('btn-launch').style.display = 'block';
        }

        function searchLyrics(i) {
            window.open(`https://search.naver.com/search.naver?query=${encodeURIComponent(slidesData[i].title + ' 가사')}`, '_blank');
        }

        document.getElementById('file-input').onchange = (e) => {
            Array.from(e.target.files).forEach(f => addSlide(URL.createObjectURL(f)));
        };
    </script>
</body>
</html>
